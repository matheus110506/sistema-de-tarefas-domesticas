<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Filho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

<h1>Minhas Tarefas</h1>

<button onclick="logout()">Sair</button>

<ul id="listaTarefas"></ul>

    </div>
<script>

document.addEventListener("DOMContentLoaded", function() {

    const filhoId = Number(localStorage.getItem('filhoId'));

    if (!filhoId) {
        window.location.href = 'login.html';
        return;
    }

    async function carregarTarefas() {

        const res = await fetch(`/api/tarefas/filho/${filhoId}`);

        if (!res.ok) {
            alert("Erro ao carregar tarefas");
            return;
        }

        const tarefas = await res.json();

        const lista = document.getElementById('listaTarefas');
        lista.innerHTML = '';

        tarefas.forEach(tarefa => {

            const li = document.createElement('li');

            li.textContent = tarefa.titulo + " - " + tarefa.descricao + " ";

            if (tarefa.concluida) {

                const span = document.createElement('span');
                span.textContent = "Concluída";
                span.style.color = "green";

                li.appendChild(span);

            } else {

                const btn = document.createElement('button');
                btn.textContent = "Concluir";

                btn.addEventListener('click', async () => {

                    btn.disabled = true; // evita clique duplo

                    const res = await fetch('/api/tarefas/concluir', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            tarefaId: tarefa.id,
                            filhoId: filhoId
                        })
                    });

                    if (!res.ok) {
                        alert("Erro ao concluir tarefa");
                        btn.disabled = false;
                        return;
                    }

                    carregarTarefas();
                });

                li.appendChild(btn);
            }

            lista.appendChild(li);

        });
    }

    window.logout = function() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    carregarTarefas();

});

</script>

</body>
</html>
