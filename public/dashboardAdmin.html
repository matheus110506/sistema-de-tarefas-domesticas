
<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

<h1>Painel Admin</h1>

<button onclick="logout()">Sair</button>

<h2>Mães</h2>

<ul id="listaMaes"></ul>

<h2>Filhos</h2>

<ul id="listaFilhos"></ul>

<h2>Logs</h2>

<ul id="logs"></ul>
</div>
</body>

<script>

async function carregarLogs(){

    const res = await fetch("/api/admin/logs");

    const logs = await res.json();

    const lista = document.getElementById("logs");

    lista.innerHTML="";

    logs.forEach(log=>{
        const li = document.createElement("li");

        li.textContent = log.acao + " - " + log.ip + " - " + log.data;

        lista.appendChild(li);
    });

}

async function banir(){

    const ip = document.getElementById("ip").value;

    await fetch("/api/admin/banir-ip",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ip})
    });

    alert("IP banido");

}

function logout(){
    localStorage.clear();
    window.location.href="index.html";
}

async function carregarMaes() {
    const res = await fetch('/api/maes');
    const maes = await res.json();

    const lista = document.getElementById('listaMaes');
    lista.innerHTML = '';

    maes.forEach(mae => {
        const li = document.createElement('li');

        li.innerHTML = `
            ${mae.nome} (id ${mae.id}) ${mae.banido ? '<span class="banido">🚫 BANIDA</span>' : ''}
            <button onclick="banirMae(${mae.id})">Banir</button>
            <button onclick="desbanirMae(${mae.id})">Desbanir</button>
        `;

        lista.appendChild(li);
    });
}

async function carregarFilhos() {
    const res = await fetch('/api/filhos');
    const filhos = await res.json();

    const lista = document.getElementById('listaFilhos');
    lista.innerHTML = '';

    filhos.forEach(filho => {
        const li = document.createElement('li');

        li.innerHTML = `
            ${filho.nome} (id ${filho.id}) ${filho.banido ? '<span class="banido">🚫 BANIDO</span>' : ''}
            <button onclick="banirFilho(${filho.id})">Banir</button>
            <button onclick="desbanirFilho(${filho.id})">Desbanir</button>
        `;

        lista.appendChild(li);
    });
}

async function banirMae(id) {
    await fetch(`/api/maes/${id}/banir`, { method: 'PUT' });
    carregarMaes();
    carregarLogs();
}

async function desbanirMae(id) {
    await fetch(`/api/maes/${id}/desbanir`, { method: 'PUT' });
    carregarMaes();
    carregarLogs();
}

async function banirFilho(id) {
    await fetch(`/api/filhos/${id}/banir`, { method: 'PUT' });
    carregarFilhos();
    carregarLogs();
}

async function desbanirFilho(id) {
    await fetch(`/api/filhos/${id}/desbanir`, { method: 'PUT' });
    carregarFilhos();
    carregarLogs();
}

carregarLogs();
carregarMaes();
carregarFilhos();

</script>
